<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opos Agent Rural</title>
    <style>
        :root { --bg: #1a3c1a; --card: #2d2419; --text: #e8e8e8; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: auto; padding: 20px; background: var(--bg); color: var(--text); }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); border: 2px solid #5d4037; }
        h1 { color: #ff9800; text-shadow: 1px 1px 2px black; text-align: center; text-transform: lowercase; }
        h3 { border-bottom: 1px solid #5d4037; padding-bottom: 5px; color: #ff9800; text-transform: lowercase; }
        
        /* Estilo de la lista de temas */
        .selector-header { display: flex; justify-content: space-between; align-items: center; }
        .btn-mini { width: auto; display: inline-block; padding: 5px 10px; font-size: 12px; margin: 0 2px; background: #444; }
        
        .tema-container { margin-bottom: 20px; }
        label { display: flex; align-items: center; padding: 10px; background: #3e3123; margin: 4px 0; border-radius: 8px; cursor: pointer; border: 1px solid #5d4037; font-size: 14px; }
        input[type="checkbox"] { margin-right: 12px; transform: scale(1.2); }
        
        button { display: block; width: 100%; padding: 16px; margin: 10px 0; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; background: #5d4037; color: white; transition: 0.2s; }
        .btn-check { background: #ff9800 !important; color: #1a1a1a !important; font-weight: bold; }
        .oculto { display: none; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #3e3123; color: white; border: 1px solid #5d4037; margin-bottom: 10px; }
        #timer { font-size: 30px; font-weight: bold; color: var(--accent); text-align: center; font-family: monospace; }
        #opciones button { text-align: center; }
    </style>
</head>
<body>
    <div id="pantalla-inicio" class="card">
        <h1>opos agent rural</h1>
        
        <div class="selector-header">
            <h3>temari general</h3>
            <div>
                <button class="btn-mini" onclick="seleccionar(true, 'gen')">tots</button>
                <button class="btn-mini" onclick="seleccionar(false, 'gen')">cap</button>
            </div>
        </div>
        <div id="lista-general" class="tema-container"></div>

        <div class="selector-header">
            <h3>temari específic</h3>
            <div>
                <button class="btn-mini" onclick="seleccionar(true, 'esp')">tots</button>
                <button class="btn-mini" onclick="seleccionar(false, 'esp')">cap</button>
            </div>
        </div>
        <div id="lista-especifico" class="tema-container"></div>

        <h3>configuració:</h3>
        <select id="tiempo-test">
            <option value="30">30 minuts</option>
            <option value="60">60 minuts</option>
            <option value="90">90 minuts</option>
        </select>
        <select id="num-preguntas">
            <option value="10">10 preguntes</option>
            <option value="25">25 preguntes</option>
            <option value="50">50 preguntes</option>
            <option value="80">80 preguntes</option>
        </select>
        <button onclick="prepararQuiz()" class="btn-check">comencem!</button>
    </div>

    <div id="pantalla-quiz" class="card oculto">
        <div id="timer">00:00</div>
        <h2 id="contador" style="font-size:12px; color:#aaa; text-align:center;"></h2>
        <div id="pregunta" style="font-size:18px; font-weight:bold; margin:20px 0; text-align:center;"></div>
        <div id="opciones"></div>
        <button id="btn-blanco" onclick="dejarEnBlanco()" style="background:#8d6e63;">en blanc (no resta)</button>
        <button id="btn-siguiente" class="oculto" onclick="siguiente()" style="background:var(--accent); color:#1a1a1a; font-weight:bold;">següent ➔</button>
    </div>

    <div id="pantalla-final" class="card oculto">
        <div id="resultado"></div>
        <button onclick="location.reload()" class="btn-check">nou test</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opos Agent Rural</title>
    <style>
        :root { 
            --bg: #1a3c1a; 
            --card: #2d2419; 
            --text: #e8e8e8; 
            --accent: #ffcc00; 
            --correct-full: #2e7d32; 
            --wrong-full: #c62828; 
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: auto; padding: 20px; background: var(--bg); color: var(--text); }
        h1, h2, h3 { text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); border: 2px solid #5d4037; }
        button { display: block; width: 100%; padding: 16px; margin: 10px 0; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; font-weight: 500; transition: 0.2s; background: #3e3123; color: white; text-align: center; }
        button:hover { background: #5d4037; }
        .btn-check { background: #ff9800 !important; color: #1a1a1a !important; font-weight: bold; text-align: center !important; font-size: 18px; }
        .btn-check:hover { background: #ffb74d !important; }
        .oculto { display: none; }
        label { display: block; padding: 15px; background: #3e3123; margin: 8px 0; border-radius: 8px; cursor: pointer; border: 1px solid #5d4037; }
        input[type="checkbox"] { margin-right: 12px; transform: scale(1.3); }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #3e3123; color: white; border: 1px solid #5d4037; margin-bottom: 10px; }
        #timer { font-size: 30px; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 15px; font-family: monospace; }
        hr { border: 0; border-top: 1px solid #5d4037; margin: 25px 0; }
    </style>
</head>
<body>
    <div id="pantalla-inicio" class="card">
        <h1 style="color: #ff9800; text-shadow: 1px 1px 2px black;">opos agent rural</h1>
        <hr>
        <h3>📂 selecciona temes:</h3>
        <label><input type="checkbox" class="tema-check" value="tema1"> Tema 1: El Departament d'Interior i Seguretat Pública</label>
        <label><input type="checkbox" class="tema-check" value="tema2"> Tema 2: Els Agents Rurals com a Policia Judicial</label>
        
        <h3>⏱️ temps:</h3>
        <select id="tiempo-test">
            <option value="15">15 minuts</option>
            <option value="30">30 minuts</option>
            <option value="60">60 minuts</option>
            <option value="90">90 minuts</option>
        </select>

        <h3>❓ nombre de preguntes:</h3>
        <select id="num-preguntas">
            <option value="10">10 preguntes</option>
            <option value="25">25 preguntes</option>
            <option value="50">50 preguntes</option>
            <option value="80">80 preguntes</option>
        </select>
        <button onclick="prepararQuiz()" class="btn-check" style="margin-top:35px;">comencem!</button>
    </div>

    <div id="pantalla-quiz" class="card oculto">
        <div id="timer">00:00</div>
        <h2 id="contador" style="font-size:14px; color:#aaa; font-weight:normal;"></h2>
        <div id="pregunta" style="font-size:19px; font-weight:bold; margin-bottom:25px; line-height: 1.4; text-align: center;"></div>
        <div id="opciones"></div>
        <hr>
        <button id="btn-blanco" onclick="dejarEnBlanco()" style="background:#8d6e63; color:white;">en blanc (no resta)</button>
        <button id="btn-siguiente" class="oculto" onclick="siguiente()" style="background:var(--accent); color:#1a1a1a; font-weight:bold;">següent pregunta ➔</button>
    </div>

    <div id="pantalla-final" class="card oculto">
        <div id="resultado"></div>
        <button onclick="location.reload()" class="btn-check">nou test</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

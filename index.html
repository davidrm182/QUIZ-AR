<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opos Agent Rural - Privat</title>

    <style>
        :root {
            --bg: #1a3c1a;
            --card: #2d2419;
            --text: #e8e8e8;
            --accent: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
        }

        h1, h3 {
            text-align: center;
            color: #ff9800;
            text-transform: lowercase;
            margin-bottom: 15px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            border: 2px solid #5d4037;
            margin-bottom: 20px;
        }

        .oculto {
            display: none !important;
        }

        input[type="password"], select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #3e3123;
            color: white;
            border: 1px solid #5d4037;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            background: #5d4037;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #795548;
        }

        .btn-check {
            background: #ff9800 !important;
            color: #1a1a1a !important;
        }

        .btn-fav {
            background: #4a4a4a !important;
            color: white !important;
            margin-top: 10px;
        }

        .btn-mini {
            width: auto;
            display: inline-block;
            padding: 5px 10px;
            font-size: 11px;
            background: #444;
            margin: 0 2px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #3e3123;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #5d4037;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            margin-right: 12px;
            transform: scale(1.2);
        }

        #opciones {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        hr {
            border: 0;
            border-top: 1px solid #5d4037;
            margin: 20px 0;
        }

        /* AJUSTE PARA LOS 4 BOTONES DE ICONOS */
        #contenedor-controles button {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0; 
            width: 100%;
        }
    </style>
</head>

<body>

    <div id="pantalla-bloqueo" class="card" style="margin-top:50px;">
        <h1>🔒 accés restringit</h1>
        <p style="text-align:center">introdueix el codi d'agent</p>
        <input type="password" id="pin-input" placeholder="****">
        <button onclick="validarPin()" class="btn-check">entrar</button>
        <p id="error-pin" class="oculto" style="color:#ff4444;text-align:center;">codi incorrecte</p>
    </div>

    <div id="contingut-protegit" class="oculto">

        <div id="pantalla-inicio" class="card">
            <h1>opos agent rural</h1>

            <button id="btn-solo-favs" onclick="prepararQuizFavs()" class="btn-fav">⭐ Fer test de preferides (<span id="count-favs">0</span>)</button>
            <hr>

            <h3>temari general</h3>
            <div style="text-align: center; margin-bottom: 10px;">
                <button class="btn-mini" onclick="seleccionar(true,'gen')">tots</button>
                <button class="btn-mini" onclick="seleccionar(false,'gen')">cap</button>
            </div>
            <div id="lista-general"></div>

            <h3 style="margin-top: 20px;">temari específic</h3>
            <div style="text-align: center; margin-bottom: 10px;">
                <button class="btn-mini" onclick="seleccionar(true,'esp')">tots</button>
                <button class="btn-mini" onclick="seleccionar(false,'esp')">cap</button>
            </div>
            <div id="lista-especifico"></div>

            <hr>

            <h3>configuració</h3>
            <label style="background: transparent; border: none; padding: 0;">Número de preguntes:</label>
            <select id="num-preguntas">
                <option value="10">10 preguntes</option>
                <option value="25">25 preguntes</option>
                <option value="50">50 preguntes</option>
                <option value="80">80 preguntes</option>
            </select>

            <button onclick="prepararQuiz()" class="btn-check">comencem</button>
        </div>

        <div id="pantalla-quiz" class="card oculto">
            <div id="pregunta" style="margin-bottom:20px;"></div>
            <div id="opciones"></div>
            <div id="contenedor-controles"></div>
        </div>

        <div id="pantalla-final" class="card oculto">
            <div id="resultado" style="font-weight:bold; text-align:center; margin-bottom:15px;"></div>
            <button onclick="location.reload()" class="btn-check">nou test</button>
        </div>

    </div>

    <script src="motor.js?v=2.4"></script>
</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen PRO</title>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --text: #e0e0e0; --accent: #4dabf7; }
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: auto; padding: 20px; background: var(--bg); color: var(--text); }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; background: #3d3d3d; color: white; }
        button:hover { background: #555; }
        .btn-check { background: #4CAF50 !important; font-weight: bold; }
        .oculto { display: none; }
        label { display: block; padding: 12px; background: #3d3d3d; margin: 8px 0; border-radius: 8px; cursor: pointer; border: 1px solid #555; }
        input[type="checkbox"] { margin-right: 10px; transform: scale(1.2); }
        #timer { font-size: 24px; font-weight: bold; color: #ffcc00; text-align: center; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="pantalla-inicio" class="card">
        <h1 style="color: var(--accent); text-align:center;">Configurar Examen</h1>
        <h3>📂 Selecciona Temas:</h3>
        <label><input type="checkbox" class="tema-check" value="tema1"> Tema 1</label>
        <label><input type="checkbox" class="tema-check" value="tema2"> Tema 2</label>
        
        <h3>⏱️ Límite de Tiempo:</h3>
        <select id="tiempo-test" style="width:100%; padding:10px; border-radius:8px; background:#3d3d3d; color:white;">
            <option value="5">5 Minutos</option>
            <option value="15">15 Minutos</option>
            <option value="30">30 Minutos</option>
            <option value="60">60 Minutos</option>
        </select>

        <h3>❓ Preguntas:</h3>
        <select id="num-preguntas" style="width:100%; padding:10px; border-radius:8px; background:#3d3d3d; color:white;">
            <option value="10">10 preguntas</option>
            <option value="25">25 preguntas</option>
            <option value="50">50 preguntas</option>
        </select>
        <button onclick="prepararQuiz()" class="btn-check" style="margin-top:30px;">¡INICIAR SIMULACRO!</button>
    </div>

    <div id="pantalla-quiz" class="card oculto">
        <div id="timer">00:00</div>
        <h2 id="contador" style="font-size:14px; color:#888;"></h2>
        <div id="pregunta" style="font-size:20px; margin-bottom:20px;"></div>
        <div id="opciones"></div>
        <button id="btn-blanco" onclick="dejarEnBlanco()" style="background:#555; color:#bbb;">Omitir (En Blanco)</button>
        <button id="btn-siguiente" class="oculto" onclick="siguiente()" style="background:var(--accent); color:white;">Siguiente ➔</button>
    </div>

    <div id="pantalla-final" class="card oculto">
        <div id="resultado"></div>
        <button onclick="location.reload()" class="btn-check">Nuevo Intento</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
